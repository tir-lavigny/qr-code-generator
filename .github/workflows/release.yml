name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version to release (e.g. 1.2.3, no leading v)'
                required: true
                type: string

jobs:
    release:
        name: Create release tag
        runs-on: ubuntu-latest

        environment: production

        permissions:
            contents: write

        steps:
            - name: Generate app token
              uses: actions/create-github-app-token@v3
              id: app-token
              with:
                  client-id: ${{ secrets.APP_CLIENT_ID }}
                  private-key: ${{ secrets.APP_PRIVATE_KEY }}

            - name: Checkout
              uses: actions/checkout@v6
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  fetch-depth: 0

            - name: Validate version format
              run: |
                  if ! echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                    echo "::error::Version must be in format X.Y.Z (e.g. 1.2.3)"
                    exit 1
                  fi

            - name: Check tag does not already exist
              run: |
                  if git ls-remote --tags origin | grep -q "refs/tags/v${{ inputs.version }}$"; then
                    echo "::error::Tag v${{ inputs.version }} already exists"
                    exit 1
                  fi

            - name: Create and push tag
              run: |
                  git config user.name  "tir-lavigny-cd[bot]"
                  git config user.email "${{ steps.app-token.outputs.installation-id }}+tir-lavigny-cd[bot]@users.noreply.github.com"
                  git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
                  git push origin "v${{ inputs.version }}"

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  gh release create "v${{ inputs.version }}" \
                    --title "v${{ inputs.version }}" \
                    --generate-notes
